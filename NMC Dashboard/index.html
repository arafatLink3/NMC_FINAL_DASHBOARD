<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NMC Portal</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='14' width='64' height='64' fill='%234f8cff'/><text x='50%25' y='58%25' text-anchor='middle' font-family='Inter,Arial' font-weight='800' font-size='28' fill='%230b1220'>N</text></svg>" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <button class="icon-btn" id="toggleSidebar" title="Toggle sidebar">☰</button>
    <div class="brand">
      <span class="logo">N</span>
      <span>NMC Portal</span>
    </div>
    <nav class="navlinks" id="topNav">
      <a href="#/dashboard" data-route="/dashboard" class="active">Home</a>
      <a href="#/about">About</a>
      <a href="#/contact">Contact</a>
    </nav>
    <div class="spacer"></div>
    <div class="theme-switch" id="themeSwitch" role="switch" aria-checked="false" title="Toggle theme (swipe or click)">
      <input type="checkbox" id="themeToggle" aria-label="Toggle dark and light mode" />
      <span class="track">
        <span class="thumb">
          <span class="ico-sun" aria-hidden="true">☀️</span>
          <span class="ico-moon" aria-hidden="true">🌙</span>
        </span>
      </span>
      <span class="theme-label" id="themeLabel">Dark</span>
    </div>
    <button class="icon-btn" id="openNotif" title="Notifications">🔔 <span class="badge" id="notifBadge" style="display:none">0</span></button>
    <button class="icon-btn" id="openSettings" title="Settings">⚙</button>
  </header>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="group-title">Main</div>
      <div class="nav-item" data-route="/dashboard"><span class="ico">📊</span> Dashboard</div>
      <div class="nav-item" data-route="/tickets"><span class="ico">🎫</span> Tickets</div>
      <div class="nav-item" data-route="/incidentLog"><span class="ico">📒</span> Incident Log</div>
      <div class="nav-item" data-route="/mail"><span class="ico">✉️</span> Mail Center</div>
      <div class="nav-item" data-route="/contacts"><span class="ico">📇</span> Contacts</div>

      <div class="group-title">Network</div>
      <div class="nav-item" data-route="/bras"><span class="ico">🛰️</span> BRAS DB</div>
      <div class="nav-item" data-route="/nms"><span class="ico">🖧</span> NMS Links</div>
      <div class="nav-item" data-route="/roster"><span class="ico">📅</span> Duty Roster</div>
      <div class="nav-item" data-route="/scr"><span class="ico">🔗</span> NTTN SCR</div>

      <div class="group-title">Maintenance</div>
      <div class="nav-item" data-route="/ccb"><span class="ico">🛠️</span> CCB / NCR / PID</div>
      <div class="nav-item" data-route="/reports"><span class="ico">📈</span> Reports</div>

      <div class="group-title">System</div>
      <div class="nav-item" data-route="/settings"><span class="ico">⚙️</span> Settings</div>
    </aside>
    <main class="main" id="view"></main>
  </div>

  <!-- Notification drawer -->
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="drawer">
    <h4>🔔 Notifications <button class="btn ghost sm" id="clearNotif">Clear all</button></h4>
    <div class="list" id="notifList"></div>
  </aside>

  <!-- Toasts -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- Modal mount -->
  <div class="modal-mask" id="modalMask"><div class="modal" id="modal"></div></div>

  <!-- Vendor: jQuery + DataTables (required by the BRAS page grid). -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script src="js/store.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/components/chatbox.js"></script>
  <script src="js/components/notif.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/tickets.js"></script>
  <script src="js/pages/incidentLog.js"></script>
  <script src="js/pages/mail.js"></script>
  <script src="js/pages/contacts.js"></script>
  <script src="js/pages/bras.js"></script>
  <script src="js/rosterParsers.js"></script>
  <script src="js/pages/roster.js"></script>
  <script src="js/pages/nms.js"></script>
  <script src="js/pages/scr.js"></script>
  <script src="js/pages/ccb.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/about.js"></script>
  <script src="js/pages/contact.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/excel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
