# Supabase project config for NMC Dashboard.
# Generated by the nmc-monorepo build pipeline.

project_id = "nmc-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://nmc.example.com"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:4173"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.nmc-api]
verify_jwt = false